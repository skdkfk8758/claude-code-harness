name: skill-creation
description: 스킬/에이전트 생성 경량 워크플로우 — 인터뷰 기반 생성, 검증, 마무리
branch-prefix: "skill/"

steps:
  - id: creation
    type: skill
    skill: skill-manager
    description: |
      skill-manager 인터뷰를 통해 스킬 또는 에이전트 생성
      create-skill / create-agent 명령 실행
    gate: approval

  - id: validation
    type: skill
    skill: verification
    description: 생성된 스킬/에이전트 검증 — validate 통과 확인
    gate: checkpoint

  - id: completion
    type: skill
    skill: finishing-branch
    description: 테스트 통과 확인 후 merge/PR/keep/discard 선택
    gate: approval
