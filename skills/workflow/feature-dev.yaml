name: feature-development
description: 기능 개발 워크플로우 — 설계부터 문서화까지
branch-prefix: "feature/"

steps:
  - id: design
    type: skill
    skill: brainstorming
    description: 요구사항 분석, 설계 옵션 비교, spec 문서 작성 → spec-reviewer 리뷰 루프
    output: docs/plans/{date}-{name}-design.md
    gate: approval

  - id: planning
    type: agent-chain
    agents:
      - planner
      - plan-reviewer
    description: |
      승인된 설계 기반 2종 문서 생성 (전략+태스크개요 / 컨텍스트)
      plan-reviewer가 비판적 리뷰 후 APPROVED/NEEDS_REVISION 판정
      NEEDS_REVISION 시 planner 재호출
    output:
      - docs/plans/{date}-{name}-plan.md
      - docs/plans/{date}-{name}-context.md
    auto: true

  - id: task-breakdown
    type: skill
    skill: writing-plans
    description: 플랜을 2-5분 단위 태스크로 분해, TDD 스텝 포함, plan-document-reviewer 리뷰
    input: docs/plans/{date}-{name}-plan.md
    output: docs/plans/{date}-{name}-tasks.md
    gate: checkpoint

  - id: implementation
    type: agent
    agent: code-refactor-master
    description: |
      배치 실행 (3태스크/배치, 배치 간 체크포인트)
      배치별 리뷰 파이프라인: spec-reviewer → code-quality-reviewer
    input: docs/plans/{date}-{name}-tasks.md
    cross-cutting:
      - name: tdd
        enforcement: enforce
      - name: verification
        enforcement: enforce
      - name: git-convention
        enforcement: enforce
      - name: systematic-debugging
        enforcement: suggest
      - name: error-learning
        enforcement: suggest
      - name: frontend-perf
        enforcement: suggest
    review-pipeline:
      batch-size: 3
      reviewers:
        - agent: spec-reviewer
        - agent: code-quality-reviewer
      fix-agent: code-refactor-master
      max-retries-per-reviewer: 1
    auto: true

  - id: review
    type: agent
    agent: code-architecture-reviewer
    description: |
      전체 구현 변경점 아키텍처 리뷰, 리뷰 리포트 생성
      검증 드리프트 탐지 포함 — 테스트 커버리지 갭, 설정 누락 체크
    output: docs/plans/{date}-{name}-review.md
    auto: true
    retry-on-fail:
      fix-agent: code-refactor-master
      max-retries: 2
      trigger-status: "NEEDS_CHANGES"

  - id: code-optimization
    type: conditional
    condition:
      check: step-status
      step-id: review
      expected: "PASS_WITH_NOTES"
      operator: "=="
    then:
      agent: code-refactor-master
      id: optimize
    description: |
      아키텍처 리뷰에서 advisory note가 있을 때만 전역 최적화 수행.
      리뷰 리포트의 advisory 항목을 입력으로 받아 중복 제거, 단순화, 재사용성 개선.
      PASS(문제 없음)면 스킵.
    cross-cutting:
      - name: verification
        enforcement: enforce
      - name: git-convention
        enforcement: enforce
    auto: true

  - id: documentation
    type: agent
    agent: documentation-architect
    description: 변경사항 기반 문서 정리 (README, 아키텍처 문서 등)
    optional: true
    auto: true

  - id: completion
    type: skill
    skill: finishing-branch
    description: |
      테스트 전체 통과 확인 후 4옵션 제시:
      merge locally / create PR / keep branch / discard
    gate: approval
