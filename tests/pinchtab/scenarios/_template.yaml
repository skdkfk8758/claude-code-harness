# PinchTab 테스트 시나리오 템플릿
# 복사하여 새 시나리오를 작성하세요.

name: my-scenario
description: 시나리오 설명을 입력하세요
url: "https://target-url.com"

# 선택적 설정
# profile: profile-name       # PinchTab 프로필
# mode: headless               # headed | headless (기본: headless)
# on_failure: continue         # continue | stop | retry
# max_retries: 1
# retry_delay: 2               # 초
# screenshot_on_fail: true

# 변수 (steps에서 ${VAR_NAME}으로 참조)
# vars:
#   USERNAME: "testuser"
#   PASSWORD: "testpass"

steps:
  # 1. 페이지 이동
  - action: navigate
    url: "https://target-url.com"
    wait: 3

  # 2. 페이지 구조 확인
  - action: snapshot
    filter: interactive
    # assert:
    #   contains: ["기대하는 요소"]

  # 3. 스크린샷 촬영
  - action: screenshot
    output: page.png

