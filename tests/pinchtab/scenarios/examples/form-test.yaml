name: form-test
description: 폼 요소 탐색 및 입력/제출 테스트
url: "${TARGET_URL}"
mode: headed
on_failure: continue
screenshot_on_fail: true

vars:
  TARGET_URL: "https://httpbin.org/forms/post"

steps:
  - action: navigate
    url: "${TARGET_URL}"
    wait: 3

  - action: snapshot
    filter: interactive
    save: form-elements.json
    assert:
      contains: ["input", "submit"]

  - action: screenshot
    output: before-fill.png

  - action: text
    assert:
      not_empty: true

  - action: screenshot
    output: after-interaction.png
